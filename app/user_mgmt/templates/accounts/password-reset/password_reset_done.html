{% extends 'accounts/base.html' %} {% load static %}

{% block content %}
<div class="login-container">
  <div class="login-card">
    <div class="row no-gutters align-items-center justify-content-center">
      <div class="col-sm-8 col-md-6 d-md-block d-none">
        <div class="login-greeting login-greeting-lg">
          <div class="align-center">
            <div class="logo">
              <img src="{% static 'front/assets/images/gov-logo.png' %}" alt="" />
            </div>
            <div>
              <p>राष्ट्रिय प्राकृतिक स्रोत तथा वित्त आयोग</p>
            </div>
          </div>
          <div class="login-divider"></div>
          <div class="greeting">
            <h3>NNRFC को अनलाइन पोर्टलमा स्वागत छ</h3>
          </div>
        </div>
      </div>
      <div class="col-sm-8 col-md-6 col-8">
        <div class="login-form">
          <h4>पासवर्ड रिसेट </h4>
          <p class="mt-2">तपाईंको कार्यालयको इमेलमा पासवर्ड परिवर्तन गर्नका लागि निर्देशनहरू पठाएको छौ।</p>
          <a class="btn btn-primary btn-block my-3" href="{% url 'user_mgmt:login' %}">लग – इन पेजमा फर्कनुहोस्</a><br/>
        </div>
      </div>
    </div>
  </div>
</div>

{% endblock content%}
