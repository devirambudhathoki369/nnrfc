{% extends 'fragments/dashboard/base.html' %} 
{% load static %}

{% block master %}
<div class="header-page">
  <h1>मास्टर डाटा कन्फिगरेसन</h1>
  <a href="{% url "dashboard:master_configuration" %}" class="btn btn-icon-only btn-sm"
    >
    <i class="ic-close-circular-filled text-danger"></i
  ></a>
</div>
{% endblock master %} 


{% block content %}

  <div class="inner screen-user-setup">
    <div class="container">
      <ul class="tab-01 nav nav-pills" id="pills-tab" role="tablist">
        <li class="nav-item">
          <a
            class="nav-link {% if not active_tab or active_tab == 'local' %}active{% endif %}"
            id="pills-masterDataTwo-tab"
            data-toggle="pill"
            href="#pills-masterDataTwo"
            data-url="{% url 'dashboard:province_create' %}"
            role="tab"
            aria-controls="pills-masterDataTwo"
            aria-selected="{% if not active_tab or active_tab == 'local' %}true{% else %}false{% endif %}"
            >स्थानीय तह</a
          >
        </li>
      </ul>
      <div class="card card-body radius-top-0">
        <div class="tab-content" id="pills-tabContent">
          <div
            class="tab-pane fade {% if not active_tab or active_tab == 'local' %}show active{% endif %}"
            id="pills-masterDataTwo"
            role="tabpanel"
            aria-labelledby="pills-masterDataTwo-tab"
          >

            <form action="{% url 'dashboard:local_update' form.instance.pk %}" id="updateForm" method="post">
            {% csrf_token %}
              <h6 class="mb-2">स्थानीय तहको डाटा सेटअप</h6>
              <div class="row">
                <div class="col-lg-3 col-md-6">
                  <div class="form-group">
                    <label>प्रदेशको नाम</label>
                    <select name="province_level" id="province_name" class="form-control level-types">
                      <option value="">छान्नुहोस्...</option>
                      {% for level in province_list %}
                        <option value="{{level.pk}}"
                          {% if level.pk == context_level.province_level.id %}selected{% endif %}>
                          {{ level.name }}
                        </option>
                      {% endfor %}
                    </select>
                  </div>
                </div>
                <div class="col-lg-3 col-md-6">
                  <div class="form-group">
                    <label>स्थानीय तहको कोड</label>
                    <input
                      name="level_code"
                      class="form-control"
                      type="number"
                      id="level_code"
                      placeholder="यहाँ स्थानीय तहको कोड टाइप गर्नुहोस्"
                      value="{{form.instance.level_code|default_if_none:''}}"
                    />
                  </div>
                </div>
                <div class="col-lg-3 col-md-6">
                  <div class="form-group">
                    <label>स्थानीय तहको नाम</label>
                    <input
                      name="name"
                      value="{{form.instance.name|default_if_none:''}}"
                      class="form-control"
                      type="text"
                      id="localName"
                      placeholder="यहाँ स्थानीय तहको नाम टाइप गर्नुहोस्"/>
                  </div>
                </div>
                <div class="col-lg-3 col-md-6">
                  <div class="form-group">
                    <label>जिल्ला</label>
                    <select name="district" id="district" class="form-control">
                      <option value="">छान्नुहोस्...</option>
                      {% for district in districts %}
                        <option value="{{district.pk}}"
                            {% if district.pk == context_level.district.id %}selected{% endif %}>
                            {{ district.name_np }}
                        </option>
                      {% endfor %}
                    </select>
                  </div>
                </div>
                <div class="col-lg-3 col-md-6">
                  <div class="form-group">
                  <label> &nbsp;</label>
                    <div>
                      <button
                        type="submit"
                        data-inline="true"
                        class="btn btn-success"
                      >शेभ गर्नुहोस्
                      </button>
                      <a class="btn btn-danger" href="{% url 'dashboard:master_configuration' %}?filter=local">रद्द गर्नुहोस्</a>
                    </div>
                  </div>
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock content %}




{% block extra_scripts %}
<script>
  $("#updateForm").submit(function (e) {
    e.preventDefault();
    
    $.ajax({
      type: "POST",
      data: {
        'province_level': $("#province_name").val(),
        'level_code': $("#level_code").val(),
        'name': $("#localName").val(),
        'district': $("#district").val(),
        csrfmiddlewaretoken: "{{ csrf_token }}",
      },
      success: function (response) {
        window.location.href = "{% url 'dashboard:master_configuration' %}?filter=local";
        setInterval('refreshPage()', 1000);
      },
    });
  });
</script>
{% endblock extra_scripts %}
