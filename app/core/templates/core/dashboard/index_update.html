<form action="{% url 'dashboard:index_update' object.id %}" class="update-form" method="post">
                 {% csrf_token %}
              <div class="form-group">
                <label>सूचकको शीर्षक</label>
                <input
                  class="form-control title-i"
                  type="text"
                  name="title"
                  placeholder="टाइप गर्नुहोस्"
                  value="{{object.title}}"
                />
              </div>
              <div class="form-row">
                <div class="col-lg-12">
                 <div class="form-group">
                      <label>Sequence ID</label> 

                      <input
                        class="form-control seq"
                        type="number"
                        name="sequence_id"
                        placeholder="जस्तै १"
                        value="{{object.sequence_id}}"
                      />
              
                    </div>
                     <div class="form-group">
                    <label>विभाग/संस्था/मन्त्रालय</label
                    ><select name="department" class="form-control departments">
                      छान्नुहोस्
                      <option val="" disabled selected>छान्नुहोस्...</option>
                      {% for depart in departments %}
                      <option value="{{depart.pk}}" {% if depart.pk == object.department.pk %}selected{% endif %}>{{depart.name}}</option>
                      {% endfor %}
                    </select>
                    <span class="error">{{form.department.errors.as_text}}</span>
                  </div>  
                  <div class="form-group">
                    <div class="form-check form-check-inline">
                      <input
                        class="form-check-input month-r"
                        type="checkbox"
                        name="month_requires"
                        id="inlineRadio22"
                        value="1"
                        {% if object.month_requires %}checked{% endif %}
                      />
                      <label class="form-check-label" for="inlineRadio22"
                        >महिना आवश्यक</label
                      >
                    </div>                   
                    </div>
                </div>
              </div>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-light" data-dismiss="modal">
                रद्द गर्नुहोस्
              </button>
              <button type="submit" class="btn btn-primary">शेभ गर्नुहोस्</button>
            </div>
             </form>


             <script>
             
    $("body").on("submit", ".update-form", function(e) {
        e.preventDefault();
        url=$(this).attr('action')  
        $.ajax({
        url: url,
        type: 'POST',           
        data: new FormData(this),
        processData: false,
        contentType: false,
        success: function (data) {
        if(data['success']){
          location.href = data['url']
        }
        else if($("input").next('p').length) $("input").nextAll('p').remove();
          for (var error in data) {
            var input = $("input[name='"+ error +"']");
            input.after('<p class="error" id='+error +'-error for='+ error +'><span>'+ data[error] +'</span></p>');
          }
              
            },
          });
         
      });
             </script>
